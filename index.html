<canvas style="position:absolute;left:0;top:0"></canvas>
<script src="il.js"></script>
<script src="complex.js"></script>
<script>
var canvas, ctx;

window.onload = function load(event) {
    canvas = document.getElementsByTagName('canvas')[0];
    ctx = canvas.getContext('2d');
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }resize();
    window.onresize = resize;
    init();
    run();
}

window.onwheel = function(event) {
    zoom = Math.exp((10 * Math.log(zoom) + -event.deltaY/100) / 10);
}

var t,d,D,Dacc,Dtotal,zoom=200;
var dt = .01;
var N = 70, v=[], vtotal = {x: 0, y: 0};
var vpath = [];

function init() {
    t=0;
    D = [];
    Dacc = [];
    Dtotal = 0;

    for (i = 0; i < IL.length ; i++) {
        let d = dist(IL[i],IL[(i+1)%IL.length])
        D.push(d);
        Dtotal += d;
        Dacc.push(Dtotal);
    }
    /*for (t = 0; t < 1; t += .001) {
    vtotal = {x: 0, y: 0};
    for (n = 0; n <= N; n++) {
        var pp = ctopoint(cmul(c(n),cexp(nimul(n*2*Math.PI*t))));
        vtotal.x += pp.x; vtotal.y += pp.y;
        if (n > 0) {
            pp = ctopoint(cmul(c(-n),cexp(nimul(-n*2*Math.PI*t))));
            vtotal.x += pp.x; vtotal.y += pp.y;
    }
    vpath.push(vtotal);
    }
    }*/
}
function run() {
requestAnimationFrame(run);
t += .0001;
t %= 1;
zoom = Math.exp((10 * Math.log(zoom) + .05*Math.sin(8*Math.PI*t)) / 10);
v = [];
vtotal = {x: 0, y: 0};
    for (n = 0; n <= N; n++) {
        v.push(ctopoint(cmul(c(n),cexp(nimul(n*2*Math.PI*t)))));
        if (n > 0) v.push(ctopoint(cmul(c(-n),cexp(nimul(-n*2*Math.PI*t)))));
    }
    v.forEach(v => {vtotal.x += v.x; vtotal.y += v.y});
draw()
}

// int from 0 to 1 ( f(t) * e ^ (-n * 2 * pi * i) ) dt
// sum delta = (0, dt ... 1-dt) ( f(delta) * e ^ (-n * 2 * pi * i * delta) * dt )

function c(n) {
    var total = {re: 0, im: 0};
    for (delta = 0; delta < 1; delta += dt) {
        total = cadd(total,nmul(dt,cmul(f(delta),cexp(nimul(-n*2*Math.PI*delta)))))
    }
    return total;
}

function moveto(x,y) {
    ctx.moveTo(canvas.width / 2 + zoom*(x - vtotal.x),canvas.height / 2 - zoom*(y - vtotal.y));
}
function movetop(p) {
    moveto(p.x,p.y)
}
function lineto(x,y) {
    ctx.lineTo(canvas.width / 2 + zoom*(x - vtotal.x),canvas.height / 2 - zoom*(y - vtotal.y));
}
function linetop(p) {
    lineto(p.x,p.y)
}

function draw() {
    ctx.fillStyle = 'black';
    ctx.fillRect(0,0,canvas.width,canvas.height);


    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';


    var pos = {x: 0, y: 0};

    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1;

    ctx.beginPath();
    movetop(pos);
    v.forEach(v => {
        pos.x += v.x;
        pos.y += v.y;
        linetop(pos);
    })
    vpath.push(pos);

    ctx.stroke();
    ctx.closePath();
    ctx.strokeStyle = 'yellow';
    ctx.lineWidth = 1;
    ctx.beginPath();
    movetop(vpath[0])
    vpath.forEach(xy => {
        //ctx.moveTo(canvas.width / 2 + zoom*xy.x,canvas.height / 2 - zoom*xy.y);
        linetop(xy);
    })
    ctx.stroke();
    ctx.closePath();

    tdraw();
}

function tdraw() {

    T = Tlerp(t);

    ctx.strokeStyle = 'red';
    ctx.beginPath();
        ctx.moveTo(canvas.width / 2 + zoom*T.x,canvas.height / 2 - zoom*T.y);
        ctx.lineTo(canvas.width / 2 + zoom*T.x,canvas.height / 2 - zoom*T.y);
    ctx.stroke();
    ctx.closePath();

}

function f(t) {
    var p = Tlerp(t);
    return {re: p.x, im: p.y};
}

function Tlerp(t) {
    var ind = Dacc.findLastIndex(d => d < t * Dtotal) + 1,
        t0 = (t * Dtotal - [0,...Dacc][ind])/(D[ind]);

    return lerp(
        IL[Math.floor(((ind) % 331))],
        IL[Math.floor(((ind + 1) % 331))],
        t0
    )
}

function lerp(p0,p1,t) {
    return {
        x: p0.x + t*(p1.x - p0.x),
        y: p0.y + t*(p1.y - p0.y)
    }
}

function dist(p0,p1) {
    var dx = p1.x-p0.x,
        dy = p1.y-p0.y;
    return Math.sqrt(dx*dx+dy*dy);
}




</script>
